# GitHub PAT for the Morphe Maven registry (maven.pkg.github.com/MorpheApp/registry)
# Required to download the app.morphe.patches Gradle plugin and the
# app.morphe:morphe-patcher library.
#
# 1. Go to https://github.com/settings/tokens
# 2. Generate a classic token with the "read:packages" scope
# 3. Put your GitHub username and token in ~/.gradle/gradle.properties
#    (as gpr.user / gpr.key) — do NOT put real credentials in this file,
#    it is tracked in git. The placeholders below are intentional.

gpr.user=YOUR_GITHUB_USERNAME
gpr.key=ghp_YOUR_TOKEN_HERE

org.gradle.parallel = true
org.gradle.caching = true
kotlin.code.style = official
version = 1.3.2
